<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 280px; background: #09090b; color: white; font-family: -apple-system, sans-serif; padding: 20px; }
    h1 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    p { font-size: 12px; color: #71717a; margin-bottom: 16px; }
    input { width: 100%; background: #27272a; border: none; border-radius: 8px; padding: 10px 12px; color: white; font-size: 12px; outline: none; margin-bottom: 8px; }
    button { width: 100%; background: #7c3aed; border: none; border-radius: 8px; padding: 10px; color: white; font-size: 13px; font-weight: 500; cursor: pointer; }
    button:hover { background: #6d28d9; }
    .success { color: #34d399; font-size: 12px; margin-top: 8px; text-align: center; }
    .error { color: #f87171; font-size: 12px; margin-top: 8px; text-align: center; }
    .status { font-size: 12px; color: #34d399; text-align: center; padding: 8px 0; }
  </style>
</head>
<body>
  <h1>DSA Shadow</h1>
  <div id="content"></div>
  <script src="popup.js"></script>
</body>
</html>
